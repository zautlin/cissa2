version: '3.8'

services:
  postgres:
    image: postgres:15.13-alpine
    container_name: cissa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cissa}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/migrations:/docker-entrypoint-initdb.d
    networks:
      - cissa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  atlas:
    image: arigaio/atlas:latest
    container_name: cissa-atlas
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./schema:/schema
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cissa}?sslmode=disable
    networks:
      - cissa-network
    command: migrate apply
    restart: "no"

volumes:
  postgres_data:

networks:
  cissa-network:
    driver: bridge
